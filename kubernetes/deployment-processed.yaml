apiVersion: apps/v1
kind: Deployment
metadata:
  name: meditracker-app
  namespace: meditracker
  labels:
    app: meditracker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: meditracker
  template:
    metadata:
      labels:
        app: meditracker
        build: "latest" 
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: meditracker
       
        image: docker.io/yahyamaani/meditracker:latest
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: uri
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: secret-key
        - name: BUILD_NUMBER
          value: "" 
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5